name: Release
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Level of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - test

jobs:
  version_bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.versioning.outputs.NEW_VER }}
      token: ${{ steps.generate_token.outputs.token }}
      changelog: ${{ steps.changelog.outputs.content }}

    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          server-id: 'github'

      - name: Read Changelog
        id: changelog
        shell: bash
        run: |
          if [ -f "CHANGELOG.md" ]; then
            {
                echo 'content<<EOF'
                cat CHANGELOG.md
                echo 'EOF'
            } >> $GITHUB_OUTPUT
            rm CHANGELOG.md
          else
            echo "CHANGELOG.md not found."
            echo "content=" >> $GITHUB_OUTPUT
          fi

      - name: Calculate & Set New Version
        id: versioning
        shell: bash
        run: |
          CURRENT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          
          IFS='.' read -ra ADDR <<< "$CURRENT_VER"
          MAJOR=${ADDR[0]}
          MINOR=${ADDR[1]}
          PATCH=${ADDR[2]}
          
          echo "MAJOR = $MAJOR" 
          echo "MINOR = $MINOR" 
          echo "PATCH = $PATCH" 
          
          if [[ "${{ github.event.inputs.bump_type }}" == "major" ]]; then
            NEW_VER="$((MAJOR + 1)).0.0"
          elif [[ "${{ github.event.inputs.bump_type }}" == "minor" ]]; then
            NEW_VER="$MAJOR.$((MINOR + 1)).0"
          elif [[ "${{ github.event.inputs.bump_type }}" == "patch" ]]; then
            NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          else
            NEW_VER="$MAJOR.$MINOR.$PATCH.test"
          fi
          
          echo "New version = $NEW_VER"
          
          echo "NEW_VER=$NEW_VER" >> $GITHUB_OUTPUT
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false

      - name: Commit & Push
        if: github.event.inputs.bump_type != 'test'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.no-reply.github.com"
          
          git commit -am "[ACTION] bump version to ${{ steps.versioning.outputs.NEW_VER }}"
          git push origin development
          
          git tag release-v${{ steps.versioning.outputs.NEW_VER }}
          git push origin release-v${{ steps.versioning.outputs.NEW_VER }}

      - name: Prepare Next Development Phase
        if: steps.changelog.outputs.content != ''
        shell: bash
        run: |
          EMPTY_TEMPLATE="# Version X.X.X\n## Changes\n### Core\n### API\n### Default Instruction Set & Handlers\n\n---\n## Breaking Changes\n### Core\n#### Minor\n#### Major\n### API\n#### Minor\n#### Major"
          
          echo "$EMPTY_TEMPLATE" > CHANGELOG.md
          mvn versions:set -DnewVersion="${{ steps.versioning.outputs.NEW_VER }}-SNAPSHOT" -DgenerateBackupPoms=false
          
          git commit -am "[ACTION] preparing next development phase"
          git push origin development

  build:
    needs: version_bump

    name: Build Artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release-v${{ needs.version_bump.outputs.new_version }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build Core Library
        shell: bash
        run: mvn -B clean package -DskipTests

      - name: Deploy To Github Packages
        shell: bash
        run: mvn clean deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Package Artifacts
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          
          cp registermaschine-api/target/*.jar dist/
          cp registermaschine-core/target/*.jar dist/
          cp registermaschine-default-instructions/target/*.jar dist/

      - name: Upload to Single Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-v${{ needs.version_bump.outputs.new_version  }}
          files: dist/*
          body: ${{ steps.changelog.outputs.content }}
          append_body: true
          make_latest: true
          name: 'Core v${{ needs.version_bump.outputs.new_version }}'
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
