name: Release
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Level of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - test

jobs:
  prepare_release:
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.versioning.outputs.NEW_VER }}
      changelog: ${{ steps.changelog.outputs.content }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Setup GraalVM
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 25

      - name: Install native-image
        run: gu install native-image

      - name: Build Changelog Tools
        run: |
          ./ChangelogPatchParser.tool
          ./ChangelogFileBuilder.tool

      - name: Read Changelog
        id: changelog
        run: |
          FILE="changelogs/CHANGELOG.md"
          {
            echo 'content<<EOF'
            cat "$FILE"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Calculate Version
        id: versioning
        run: |
          CURRENT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

          IFS='.' read -ra ADDR <<< "$CURRENT_VER"
          MAJOR=${ADDR[0]}
          MINOR=${ADDR[1]}
          PATCH=${ADDR[2]}

          case "${{ github.event.inputs.bump_type }}" in
            major) NEW_VER="$((MAJOR+1)).0.0" ;;
            minor) NEW_VER="$MAJOR.$((MINOR+1)).0" ;;
            patch) NEW_VER="$MAJOR.$MINOR.$((PATCH+1))" ;;
            *) NEW_VER="$MAJOR.$MINOR.$PATCH.test" ;;
          esac

          echo "NEW_VER=$NEW_VER" >> $GITHUB_OUTPUT
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false

      - name: Commit + Tag
        if: github.event.inputs.bump_type != 'test'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.no-reply.github.com"

          git commit -am "release ${{ steps.versioning.outputs.NEW_VER }}"
          git tag "release-v${{ steps.versioning.outputs.NEW_VER }}"
          git push origin development --tags

  build_and_release:
    needs: prepare_release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release-v${{ needs.prepare_release.outputs.new_version }}

      - name: Setup Java (Temurin for build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build Maven Project
        run: mvn -B clean package -DskipTests

      - name: Deploy
        run: mvn clean deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Package Artifacts
        run: |
          rm -rf dist
          mkdir dist

          cp registermaschine-api/target/*.jar dist/
          cp registermaschine-core/target/*.jar dist/
          cp registermaschine-default-instructions/target/*.jar dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-v${{ needs.prepare_release.outputs.new_version }}
          files: dist/*
          body: ${{ needs.prepare_release.outputs.changelog }}
          make_latest: true
          name: Core v${{ needs.prepare_release.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}